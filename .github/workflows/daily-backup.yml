name: Daily Database Backup

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3 psycopg2-binary python-dotenv

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BACKUP_DB_PASSWORD: ${{ secrets.BACKUP_DB_PASSWORD }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/backup_db.py

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Falha no backup do banco de dados - " + new Date().toISOString().split('T')[0],
              body: "O backup agendado automatico falhou.\n\n" +
                    "Verifique os logs da action: " +
                    context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo +
                    "/actions/runs/" + context.runId,
              labels: ["backup", "automation"]
            });

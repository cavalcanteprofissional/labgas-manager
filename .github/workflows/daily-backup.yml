name: Daily Database Backup

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3 psycopg2-binary python-dotenv supabase

      - name: Run backup
        id: backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BACKUP_DB_PASSWORD: ${{ secrets.BACKUP_DB_PASSWORD }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python scripts/backup_db.py --check-hash --result-file .backup_result.json 2>backup_error.log

      - name: Parse backup result
        id: parse_result
        if: success() || failure()
        run: |
          if [ -f .backup_result.json ]; then
            echo "status=$(jq -r '.status' .backup_result.json)" >> $GITHUB_OUTPUT
            echo "reason=$(jq -r '.reason // empty' .backup_result.json)" >> $GITHUB_OUTPUT
            echo "filename=$(jq -r '.filename // empty' .backup_result.json)" >> $GITHUB_OUTPUT
            echo "timestamp=$(jq -r '.timestamp // empty' .backup_result.json)" >> $GITHUB_OUTPUT
            echo "hash=$(jq -r '.hash // empty' .backup_result.json)" >> $GITHUB_OUTPUT
            echo "size_mb=$(jq -r '.size_mb // empty' .backup_result.json)" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
            echo "reason=result file not found" >> $GITHUB_OUTPUT
          fi

      - name: Upload backup artifact
        if: steps.parse_result.outputs.status == 'uploaded'
        uses: actions/upload-artifact@v4
        with:
          name: labgas-backup-${{ steps.parse_result.outputs.timestamp }}
          path: ${{ steps.parse_result.outputs.filename }}
          retention-days: 30

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backup-error-logs-${{ github.run_id }}
          path: |
            backup_error.log
            .backup_result.json
          retention-days: 7

      - name: Save failure reason
        if: failure()
        run: |
          jq -r '.reason // "desconhecido"' .backup_result.json > backup_reason.txt 2>/dev/null || echo "desconhecido" > backup_reason.txt

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const trigger = '${{ github.event_name }}' === 'schedule' ? '⏰ agendado' : '👤 manual';
            const status = '${{ steps.parse_result.outputs.status }}';
            const reason = fs.readFileSync('backup_reason.txt', 'utf8').trim();
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            const artifactUrl = runUrl + '/artifacts';

            let body = '### ❌ Falha no Backup (PostgreSQL)\n\n';
            body += '| Detalhe | Valor |\n';
            body += '|---------|-------|\n';
            body += '| Data | ' + date + ' |\n';
            body += '| Gatilho | ' + trigger + ' |\n';
            body += '| Workflow | [' + context.runId + '](' + runUrl + ') |\n';
            body += '| Branch | ' + (context.ref || 'unknown') + ' |\n';
            body += '| Commit | `' + (context.sha || 'unknown').substring(0, 7) + '` |\n';
            body += '| Status | `' + status + '` |\n';

            if (status === 'error') {
              body += '| Motivo | ' + (reason || 'desconhecido') + ' |\n';
            }

            body += '\n### 📋 Log de Erro\n\n';
            body += 'Os logs completos de erro estão disponíveis como artifact:\n';
            body += '➡️ **[backup-error-logs-' + context.runId + '](' + artifactUrl + ')** (retenção: 7 dias)\n';

            if (status === 'error' && reason) {
              body += '\n```\n' + reason.substring(0, 500) + '\n```\n';
            }

            body += '\n### 🛠️ Ações Recomendadas\n';
            body += '1. Baixe o artifact **[backup-error-logs-' + context.runId + '](' + artifactUrl + ')** acima\n';
            body += '2. Verifique `backup_error.log` para o traceback completo\n';
            body += '3. Confira as credenciais (DATABASE_URL, R2) nos Secrets\n';
            body += '4. Execute o workflow manualmente para testar\n';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Falha no backup PostgreSQL - ' + date,
              body: body,
              labels: ['backup', 'automation', 'bug']
            });

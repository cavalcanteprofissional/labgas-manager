name: MySQL Daily Backup

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install mysql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mysql-client

      - name: Install AWS CLI v2
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip curl
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Run backup
        id: backup
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '3306' }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -e
          TMPFILE=$(mktemp)
          ERRLOG="backup_error.log"
          trap "rm -f '$TMPFILE'" EXIT

          echo ">>> Gerando dump..."
          mysqldump -h "$DB_HOST" -P "$DB_PORT" \
            -u "$DB_USER" -p"$DB_PASS" \
            --single-transaction --routines --triggers \
            "$DB_NAME" > "$TMPFILE" 2>>"$ERRLOG"

          if [ ! -s "$TMPFILE" ]; then
            echo ">>> mysqldump falhou ou produziu saída vazia"
            echo "backup_status=error" >> $GITHUB_OUTPUT
            echo "backup_reason=mysqldump failed or empty output" >> $GITHUB_OUTPUT
            exit 1
          fi

          HASH=$(sha256sum "$TMPFILE" | cut -d' ' -f1)
          SIZE_BYTES=$(stat -c%s "$TMPFILE")
          echo ">>> SHA256: $HASH (${SIZE_BYTES} bytes)"

          echo ">>> Buscando hash anterior no R2..."
          OLD_HASH=$(AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            aws s3 cp "s3://$R2_BUCKET/last_backup_hash.txt" - \
            --endpoint-url "$R2_ENDPOINT" 2>>"$ERRLOG" || echo "")

          if [ "$HASH" = "$OLD_HASH" ]; then
            echo ">>> Nenhuma alteracao — backup pulado."
            echo "backup_status=skipped" >> $GITHUB_OUTPUT
            echo "backup_hash=$HASH" >> $GITHUB_OUTPUT
            exit 0
          fi

          TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
          FILENAME="mysql_backup_${TIMESTAMP}.sql.gz"
          gzip -c "$TMPFILE" > "$FILENAME"

          echo ">>> Upload para R2: s3://$R2_BUCKET/$FILENAME"
          AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
          aws s3 cp "$FILENAME" "s3://$R2_BUCKET/$FILENAME" \
            --endpoint-url "$R2_ENDPOINT" 2>>"$ERRLOG"

          echo ">>> Atualizando hash no R2..."
          echo "$HASH" | AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            aws s3 cp - "s3://$R2_BUCKET/last_backup_hash.txt" \
            --endpoint-url "$R2_ENDPOINT" 2>>"$ERRLOG"

          rm -f "$FILENAME"
          echo ">>> Backup concluido: $FILENAME"
          echo "backup_status=uploaded" >> $GITHUB_OUTPUT
          echo "backup_filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "backup_hash=$HASH" >> $GITHUB_OUTPUT
          echo "backup_size=$SIZE_BYTES" >> $GITHUB_OUTPUT

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-backup-error-logs-${{ github.run_id }}
          path: backup_error.log
          retention-days: 7

      - name: Get error log excerpt
        id: error_log
        if: failure()
        run: |
          if [ -s backup_error.log ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            {
              echo "excerpt<<EOF"
              head -c 2000 backup_error.log
              echo ""
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const trigger = '${{ github.event_name }}' === 'schedule' ? '⏰ agendado' : '👤 manual';
            const status = '${{ steps.backup.outputs.backup_status }}';
            const reason = '${{ steps.backup.outputs.backup_reason }}';
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            const artifactUrl = runUrl + '/artifacts';
            const hasLog = '${{ steps.error_log.outputs.found }}' === 'true';
            const excerpt = `${{ steps.error_log.outputs.excerpt }}`;

            let body = '### ❌ Falha no Backup MySQL\n\n';
            body += '| Detalhe | Valor |\n';
            body += '|---------|-------|\n';
            body += '| Data | ' + date + ' |\n';
            body += '| Gatilho | ' + trigger + ' |\n';
            body += '| Workflow | [' + context.runId + '](' + runUrl + ') |\n';
            body += '| Branch | ' + (context.ref || 'unknown') + ' |\n';
            body += '| Commit | `' + (context.sha || 'unknown').substring(0, 7) + '` |\n';
            body += '| Banco | ' + ('${{ secrets.DB_NAME }}' || 'N/A') + ' |\n';

            if (status === 'error' && reason) {
              body += '| Motivo | ' + reason + ' |\n';
            }

            body += '\n### 📋 Log de Erro\n\n';
            body += 'Os logs completos de erro estão disponíveis como artifact:\n';
            body += '➡️ **[mysql-backup-error-logs-' + context.runId + '](' + artifactUrl + ')** (retenção: 7 dias)\n';

            if (hasLog && excerpt) {
              body += '\n```\n' + excerpt.substring(0, 2000) + '\n```\n';
            }

            body += '\n### 🛠️ Ações Recomendadas\n';
            body += '1. Baixe o artifact **[mysql-backup-error-logs-' + context.runId + '](' + artifactUrl + ')** acima\n';
            body += '2. Verifique o log completo para diagnóstico\n';
            body += '3. Confira as credenciais (DB_HOST, DB_USER, DB_PASS, DB_NAME, R2) nos Secrets\n';
            body += '4. Execute o workflow manualmente para testar\n';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Falha no backup MySQL - ' + date,
              body: body,
              labels: ['backup', 'automation', 'bug']
            });

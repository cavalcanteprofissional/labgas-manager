[pytest]
testpaths = tests
python_files = test_*.py
base_url = http://localhost:5000
markers =
    modais: Testes de modais (editar, excluir, bulk). Use --run-modais para incluir.
    footer: Testes do footer de sessão (timer, nome, visibilidade).
    export: Testes de exportacao (JSON, CSV, Excel, MD). Use --run-export para incluir.
    backup: Testes de backup e restore (scripts/backup_db.py e restore_db.py). Use --run-backup para incluir.
